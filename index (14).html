<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>今日優惠券</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --bg-navy-1: #16294B;
    --bg-navy-2: #0D1B33;
    --panel: #FFF8F9;
    --navy: #14294D;
    --navy-soft: #2c4470;
    --gold: #C79A5C;
    --gold-soft: #E9D3AC;
    --text: #26263a;
    --muted: #7c7c92;
    --on-navy: #F4EEDF;
    --on-navy-sub: rgba(244,238,223,0.68);
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    font-family:'Noto Sans TC', sans-serif;
    background: radial-gradient(circle at 50% 0%, var(--bg-navy-1) 0%, var(--bg-navy-2) 70%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 28px 16px;
    color: var(--text);
  }

  .wrap{ width:100%; max-width: 420px; }

  .brand{
    text-align:center;
    margin-bottom: 18px;
  }
  .brand-seal{
    width:64px; height:64px; border-radius:50%;
    background: #FFFFFF;
    display:flex; align-items:center; justify-content:center;
    margin: 0 auto 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    padding: 8px;
  }
  .brand-seal img{ width:100%; height:100%; object-fit:contain; }
  .brand-script{
    font-style: italic;
    font-family:'Noto Serif TC', serif;
    font-size:11px; color: var(--gold);
    letter-spacing:2px;
    margin-bottom: 4px;
  }
  .brand-wordmark{
    font-family:'Noto Serif TC', serif;
    font-weight:700; font-size:22px; color: var(--on-navy);
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .brand-wordmark .wm-divider{ color: var(--gold); font-weight:400; margin: 0 6px; }
  .brand-title{
    font-family:'Noto Serif TC', serif;
    font-weight:700; font-size:17px; color: var(--on-navy);
    letter-spacing: 1px;
  }
  .brand-sub{
    font-size:11px; color: var(--on-navy-sub); margin-top:3px; letter-spacing:2px;
  }

  .card{
    background: var(--panel);
    border-radius: 20px;
    padding: 26px 22px 24px;
    box-shadow: 0 16px 40px rgba(29,43,79,0.14);
    border: 1px solid rgba(185,139,46,0.18);
    position: relative;
  }
  .card::before{
    content:'';
    position:absolute; inset: 8px;
    border: 1px dashed var(--gold-soft);
    border-radius: 14px;
    pointer-events:none;
  }
  .card-inner{ position:relative; text-align:center; }

  .state-loading{ padding: 30px 0; color: var(--muted); font-size:13.5px; }
  .spinner{
    width:26px; height:26px; margin:0 auto 12px;
    border:3px solid var(--gold-soft); border-top-color: var(--gold);
    border-radius:50%; animation: spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .state-notice{ padding: 10px 0 6px; }
  .state-notice-icon{
    width:44px; height:44px; margin: 0 auto 14px;
    border-radius:50%; background: var(--pink-bg-2);
    display:flex; align-items:center; justify-content:center;
  }
  .state-notice-icon svg{ width:22px; height:22px; }
  .state-notice-title{
    font-family:'Noto Serif TC', serif;
    font-size:16px; font-weight:700; color: var(--navy);
    margin-bottom: 8px;
  }
  .state-notice-desc{
    font-size:12.5px; color:#4a4a5e; line-height:1.9;
  }

  .promo-title{
    font-family:'Noto Serif TC', serif;
    font-size:18px; font-weight:700; color: var(--navy);
    line-height:1.6; margin: 4px 0 10px;
  }
  .promo-desc{ font-size:13.5px; color:#4a4a5e; line-height:1.9; margin-bottom: 16px; }
  .promo-desc .loc{ color: var(--gold); font-weight:700; }

  .divider{
    border: none; border-top: 1.5px dashed var(--gold-soft);
    margin: 18px 0;
  }

  .coupon-code{
    font-family:'Space Mono', monospace;
    font-size: 30px; font-weight:700; letter-spacing:4px;
    color: var(--navy);
    padding: 6px 0 2px;
  }
  .coupon-label{ font-size:11.5px; color: var(--muted); letter-spacing:1px; }
  .qr-holder{ display:flex; justify-content:center; margin: 14px 0 6px; }
  .qr-holder img, .qr-holder canvas{ border-radius: 10px; border: 6px solid #fff; box-shadow: 0 4px 16px rgba(29,43,79,0.12); }

  .status-badge{
    display:inline-block; padding: 5px 14px; border-radius: 20px;
    font-size:12px; font-weight:700; margin-top: 10px;
  }
  .status-open{ background: #E3F1E6; color:#1f6b34; }
  .status-used{ background: #F6E3E3; color:#a03434; }

  .meta{ font-size:11.5px; color: var(--muted); margin-top:14px; line-height:1.7; }

  .fallback-btn{
    margin-top: 18px; width:100%; padding:13px; border-radius:10px; border:none;
    background: var(--navy); color:#fff; font-weight:700; font-size:14px; cursor:pointer;
  }

  .redeem-zone{ margin-top:18px; padding-top:16px; border-top: 1.5px dashed var(--gold-soft); }
  .redeem-hint{ font-size:11px; color: var(--muted); margin-bottom:8px; }
  .redeem-btn{
    width:100%; padding:14px; border-radius:10px; border:none;
    background: var(--gold); color:#fff; font-weight:700; font-size:14.5px; cursor:pointer;
    letter-spacing:1px;
  }
  .redeem-btn:active{ transform: scale(0.98); }
  .redeem-btn:disabled{ background:#ddd0b0; cursor:default; }

  .footer-note{ text-align:center; font-size:11px; color: rgba(244,238,223,0.4); margin-top:16px; }
</style>
</head>

      .from('coupons')
      .insert({
        code, line_user_id: identity.userId, display_name: identity.displayName,
        campaign_date: date, used: false
      })
      .select()
      .single();

    if(insErr) throw insErr;
    return created;
  }

  function renderCoupon(coupon){
    el.innerHTML = `
      <div class="promo-title">${PROMO_TITLE}</div>
      <div class="promo-desc">${PROMO_DESC}</div>
      <hr class="divider" />
      <div class="coupon-label">優惠券代碼</div>
      <div class="coupon-code">${coupon.code}</div>
      <div class="qr-holder" id="qrHolder"></div>
      <div>
        <span class="status-badge ${coupon.used ? 'status-used' : 'status-open'}" id="statusBadge">
          ${coupon.used ? '已兌換' : '尚未使用，請出示給店員'}
        </span>
      </div>
      <div class="meta">${coupon.display_name || ''} · ${coupon.campaign_date}</div>
      ${!coupon.used ? `
        <div class="redeem-zone">
          <div class="redeem-hint">👇 此按鈕請交給現場人員操作</div>
          <button class="redeem-btn" id="redeemBtn">現場核銷</button>
        </div>
      ` : ''}
    `;
    const canvasHolder = document.getElementById('qrHolder');
    try{
      const canvas = document.createElement('canvas');
      canvasHolder.appendChild(canvas);
      QRCode.toCanvas(canvas, coupon.code, { width: 150, margin: 1, color: { dark: '#14294D', light: '#FFFFFF' } });
    }catch(qrErr){
      console.error('QR code 產生失敗', qrErr);
      canvasHolder.innerHTML = '<div style="font-size:11px;color:#a03434;">QR code 載入失敗，請直接出示上方代碼</div>';
    }

    if(!coupon.used){
      document.getElementById('redeemBtn').onclick = () => handleRedeem(coupon);
    }
  }

  async function handleRedeem(coupon){
    const btn = document.getElementById('redeemBtn');
    if(!confirm('確認要核銷這張優惠券嗎？此動作僅限現場人員操作，核銷後無法復原。')) return;

    btn.disabled = true;
    btn.textContent = '處理中…';

    // 核銷前先重新確認這張券還沒被用過，避免同時被核銷兩次
    const { data: latest, error: checkErr } = await supabase
      .from('coupons').select('used').eq('code', coupon.code).maybeSingle();

    if(checkErr){
      btn.disabled = false; btn.textContent = '現場核銷';
      alert('核銷失敗，請再試一次');
      return;
    }
    if(latest && latest.used){
      alert('這張券已經核銷過了');
      coupon.used = true;
      renderCoupon(coupon);
      return;
    }

    const { error: updErr } = await supabase
      .from('coupons')
      .update({ used: true, used_at: new Date().toISOString() })
      .eq('code', coupon.code);

    if(updErr){
      btn.disabled = false; btn.textContent = '現場核銷';
      alert('核銷失敗，請再試一次');
      return;
    }

    coupon.used = true;
    renderCoupon(coupon);
  }

  try{
    const identity = await getIdentity();
    if(!identity){
      clearTimeout(watchdog);
      showOpenInLineNotice();
      return;
    }
    const coupon = await findOrCreateCoupon(identity);
    clearTimeout(watchdog);
    renderCoupon(coupon);
  }catch(e){
    clearTimeout(watchdog);
    console.error(e);
    showError('讀取優惠券時發生問題，請稍後再試，或聯繫現場人員協助。');
  }
})();
</script>
</body>
</html>
