<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>後台統計</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');
  :root{
    --navy:#1D2B4F; --navy-soft:#33406b; --panel:#FFF8F9; --bg:#F3E9EC;
    --gold:#B98B2E; --gold-soft:#E9D9B0; --text:#26263a; --muted:#7c7c92;
    --usedbg:#F6E3E3; --used:#a03434; --openbg:#E3F1E6; --open:#1f6b34;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Noto Sans TC', sans-serif; background:var(--bg); min-height:100vh; padding:24px 16px; }
  .wrap{ max-width:640px; margin:0 auto; }
  h1{ font-family:'Noto Serif TC', serif; color:var(--navy); font-size:20px; text-align:center; margin-bottom:18px; }
  .card{ background:var(--panel); border-radius:18px; padding:20px; box-shadow:0 12px 30px rgba(29,43,79,0.14); margin-bottom:14px; }
  input{ width:100%; padding:11px 12px; border-radius:9px; border:1.5px solid var(--gold-soft); font-size:15px; margin-bottom:10px; }
  button{ width:100%; padding:12px; border:none; border-radius:10px; font-weight:700; font-size:14px; cursor:pointer; background:var(--navy); color:#fff; }
  .stats-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
  .stat{ background:var(--panel); border-radius:14px; padding:16px; text-align:center; box-shadow:0 8px 20px rgba(29,43,79,0.1); }
  .stat-num{ font-family:'Space Mono', monospace; font-size:28px; font-weight:700; color:var(--navy); }
  .stat-label{ font-size:11.5px; color:var(--muted); margin-top:2px; }
  table{ width:100%; border-collapse:collapse; font-size:12.5px; }
  th{ text-align:left; padding:6px; color:var(--muted); border-bottom:1.5px solid var(--gold-soft); position:sticky; top:0; background:var(--panel); }
  td{ padding:6px; border-bottom:1px solid #f0e0e5; font-family:'Space Mono', monospace; }
  .pill{ padding:2px 9px; border-radius:16px; font-size:10.5px; font-weight:700; font-family:'Noto Sans TC', sans-serif; }
  .pill-used{ background:var(--usedbg); color:var(--used); }
  .pill-open{ background:var(--openbg); color:var(--open); }
  .tablewrap{ max-height:360px; overflow-y:auto; }
  #gate{ max-width:340px; margin:60px auto 0; }
</style>
</head>
<body>
<div class="wrap">
  <div id="gate">
    <h1>📊 後台統計</h1>
    <div class="card">
      <input type="email" id="email" placeholder="管理員帳號 (Email)" autocomplete="username" />
      <input type="password" id="password" placeholder="密碼" autocomplete="current-password" />
      <button id="enterBtn">登入後台</button>
      <div id="gateMsg"></div>
    </div>
  </div>
  <div id="dashArea" style="display:none;">
    <h1>📊 優惠券後台統計</h1>
    <button id="logoutBtn" style="background:var(--navy-soft); margin-bottom:10px;">登出</button>
    <div class="stats-grid">
      <div class="stat"><div class="stat-num" id="numTotal">-</div><div class="stat-label">累計發放張數</div></div>
      <div class="stat"><div class="stat-num" id="numUsed">-</div><div class="stat-label">累計兌換張數</div></div>
    </div>
    <div class="card" id="dayBreakdown"></div>
    <div class="card tablewrap">
      <table>
        <thead><tr><th>代碼</th><th>顧客</th><th>日期</th><th>狀態</th></tr></thead>
        <tbody id="tblBody"></tbody>
      </table>
    </div>
    <button id="refreshBtn" style="margin-top:8px;">重新整理</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  // ====== 請填入你自己的設定 ======
  const SUPABASE_URL = 'https://nagwmruivgyyrdurvwrg.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_6KfIDNqzuOJXxlIf9koXeQ_O-XgmeU3';
  // ================================
  // 這裡不再需要填寫密碼：管理員帳號是在 Supabase 後台的
  // 「Authentication → Users」裡建立的，登入時輸入那組 Email + 密碼即可。
  // 資料表本身設定了 RLS：只有「登入成功」的管理員才讀得到優惠券資料，
  // 沒登入的人就算打開瀏覽器主控台，也拿不到任何一筆資料。

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function tryEnterDashboard(){
    const { data: { session } } = await supabase.auth.getSession();
    if(session){
      document.getElementById('gate').style.display = 'none';
      document.getElementById('dashArea').style.display = 'block';
      loadDashboard();
      return true;
    }
    return false;
  }

  document.getElementById('enterBtn').onclick = async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    document.getElementById('gateMsg').innerHTML = '';

    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if(error){
      document.getElementById('gateMsg').innerHTML = `<div style="color:#a03434;font-size:13px;margin-top:6px;">帳號或密碼錯誤</div>`;
      return;
    }
    await tryEnterDashboard();
  };

  document.getElementById('logoutBtn').onclick = async () => {
    await supabase.auth.signOut();
    document.getElementById('dashArea').style.display = 'none';
    document.getElementById('gate').style.display = 'block';
  };

  document.getElementById('refreshBtn').onclick = loadDashboard;

  // 如果先前已經登入過（尚未登出），重新整理頁面時直接進後台，不用再輸入一次
  tryEnterDashboard();

  async function loadDashboard(){
    const { data: coupons, error } = await supabase
      .from('coupons').select('*').order('issued_at', { ascending:false });
    if(error){ alert('讀取失敗：' + error.message); return; }

    const total = coupons.length;
    const used = coupons.filter(c => c.used).length;
    document.getElementById('numTotal').textContent = total;
    document.getElementById('numUsed').textContent = used;

    const byDay = {};
    coupons.forEach(c=>{
      byDay[c.campaign_date] = byDay[c.campaign_date] || { issued:0, used:0 };
      byDay[c.campaign_date].issued++;
      if(c.used) byDay[c.campaign_date].used++;
    });
    const days = Object.keys(byDay).sort().reverse();
    document.getElementById('dayBreakdown').innerHTML = days.length
      ? days.map(d => `<div style="display:flex;justify-content:space-between;padding:6px 2px;font-size:12.5px;border-bottom:1px dashed #E9D9B0;"><span>${d}</span><span>發放 ${byDay[d].issued}／兌換 ${byDay[d].used}</span></div>`).join('')
      : '<div style="font-size:12.5px;color:#7c7c92;">尚無資料</div>';

    document.getElementById('tblBody').innerHTML = coupons.slice(0,200).map(c => `
      <tr>
        <td>${c.code}</td>
        <td>${c.display_name || '-'}</td>
        <td>${c.campaign_date}</td>
        <td><span class="pill ${c.used ? 'pill-used' : 'pill-open'}">${c.used ? '已兌換' : '未使用'}</span></td>
      </tr>
    `).join('') || '<tr><td colspan="4" style="text-align:center;padding:14px;">尚無資料</td></tr>';
  }
})();
</script>
</body>
</html>
